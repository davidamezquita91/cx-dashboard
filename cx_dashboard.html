<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX Metrics Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --text: #e8eaf0;
    --muted: #5a6180;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
    --teal: #14b8a6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .logo { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .date-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    color: var(--muted);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 20px 40px 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    color: var(--muted);
    transition: all 0.2s;
    border: 1px solid transparent;
    border-bottom: none;
    user-select: none;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active {
    color: var(--accent);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
    margin-bottom: -1px;
    z-index: 1;
  }

  main { padding: 32px 40px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* STAT CARDS */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    border-top: 2px solid var(--accent-color, var(--accent));
  }
  .stat-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .stat-value { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; color: var(--accent-color, var(--text)); }
  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 5px; font-family: 'DM Mono', monospace; }

  /* CHARTS GRID */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 22px 18px;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chart-title span { color: var(--text); font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0; }
  .chart-wrap { position: relative; }
  .chart-wrap canvas { width: 100% !important; }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* IMPLEMENTATIONS */
  .impl-stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .epics-grid { display: flex; flex-direction: column; gap: 16px; }
  .epic-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .epic-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
    gap: 16px;
  }
  .epic-header:hover { background: #20253a; }
  .epic-meta { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .epic-key { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .epic-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .epic-category {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
    letter-spacing: 0.08em;
  }
  .epic-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .epic-assignee { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .epic-progress { display: flex; align-items: center; gap: 8px; }
  .progress-bar { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; }
  .progress-pct { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); width: 32px; text-align: right; }
  .chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .epic-group.open .chevron { transform: rotate(180deg); }

  .stories-table { width: 100%; border-collapse: collapse; }
  .stories-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .stories-table td {
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .stories-table tr:last-child td { border-bottom: none; }
  .stories-table tr:hover td { background: rgba(79,142,247,0.04); }
  .epic-update {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    background: rgba(79,142,247,0.03);
  }
  .epic-update-icon { font-size: 13px; margin-top: 1px; flex-shrink: 0; }
  .epic-update-body { flex: 1; min-width: 0; }
  .epic-update-meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .epic-update-text {
    font-size: 12px; color: var(--text); line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }

  /* BADGES */
  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .badge-done { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .badge-inprogress { background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
  .badge-todo { background: rgba(90,97,128,0.2); color: var(--muted); border: 1px solid var(--border); }

  .due-date { font-family: 'DM Mono', monospace; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .due-date.overdue { color: var(--red); }
  .due-date.due-soon { color: var(--yellow); }
  .due-date.ok { color: var(--muted); }
  .due-date.no-date { color: var(--border); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* SUPPORT TABLE */
  .support-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    font-size: 13px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .data-table td {
    padding: 9px 14px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(79,142,247,0.04); }
  .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .badge-urgent { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .badge-high { background: rgba(249,115,22,0.12); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
  .badge-normal { background: rgba(90,97,128,0.2); color: var(--muted); border: 1px solid var(--border); }
  .badge-low { background: rgba(90,97,128,0.1); color: var(--muted); border: 1px solid var(--border); }
  .badge-bug { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .badge-question { background: rgba(124,92,252,0.12); color: var(--accent2); border: 1px solid rgba(124,92,252,0.2); }
  .badge-task { background: rgba(20,184,166,0.12); color: var(--teal); border: 1px solid rgba(20,184,166,0.2); }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .page-btns { display: flex; gap: 6px; }
  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  .hidden { display: none; }

  .hours-cell {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }
  .hours-fast { color: var(--green); }
  .hours-ok { color: var(--yellow); }
  .hours-slow { color: var(--red); }

  /* ENGINEERING ESCALATION */
  .escalation-section {
    margin-top: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 22px 18px;
  }
  .escalation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }
  .esc-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .esc-number { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .esc-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px; }
  .esc-sub { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .esc-breakdown { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .esc-row { display: flex; align-items: center; gap: 8px; }
  .esc-row-label { font-size: 11px; flex: 1; }
  .esc-bar-bg { flex: 2; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .esc-bar-fill { height: 100%; border-radius: 2px; }
  .esc-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 28px; text-align: right; }

  /* BUGS & TASKS TAB */
  .bugs-stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .table-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
  }
  .table-tab {
    padding: 7px 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .table-tab.active { color: var(--accent); border-color: var(--border); border-bottom-color: var(--bg); background: var(--bg); margin-bottom: -1px; }
  .table-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* EPIC LINKED ITEMS */
  .epic-linked {
    border-top: 1px solid var(--border);
    padding: 10px 16px 12px;
    background: rgba(124,92,252,0.02);
  }
  .epic-linked-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .epic-linked-list { display: flex; flex-direction: column; gap: 4px; }
  .epic-linked-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 6px;
    background: var(--surface2);
  }
  .item-type-icon { font-size: 10px; flex-shrink: 0; }
  .item-key { font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; font-size: 10px; }
  .item-summary { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge-item-open { background: rgba(90,97,128,0.15); color: var(--muted); border: 1px solid var(--border); }
  .badge-item-inprogress { background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
  .badge-item-done { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .badge-item-blocked { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  /* INSIGHTS STRIP */
  .insights-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .insight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .insight-icon { font-size: 20px; }
  .insight-headline { font-size: 12px; font-weight: 700; line-height: 1.3; }
  .insight-detail { font-size: 11px; color: var(--muted); line-height: 1.55; }

  /* SUBCATEGORY TABLE */
  .subcat-table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .subcat-table { width: 100%; border-collapse: collapse; }
  .subcat-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .subcat-table td {
    padding: 8px 14px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .subcat-table tr:last-child td { border-bottom: none; }
  .subcat-table tr:hover td { background: rgba(79,142,247,0.03); }
  .subcat-name-cell { position: relative; display: flex; align-items: center; min-width: 180px; }
  .subcat-vol-bar { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; z-index: 0; }
  .subcat-name { position: relative; z-index: 1; font-size: 12px; font-weight: 600; text-transform: capitalize; padding: 3px 0; }
  .subcat-cat-chip { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; text-transform: lowercase; letter-spacing: 0.05em; }
  .subcat-num { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; }
  .esc-badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Winmore · CX Operations</div>
    <h1>Customer Experience Metrics</h1>
  </div>
  <div class="header-right">
    <div class="date-pill">As of Jun 22, 2026</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('implementations')">Implementations</div>
  <div class="tab" onclick="switchTab('support')">Support Tickets · 2026</div>
  <div class="tab" onclick="switchTab('bugs')">Bugs &amp; Tasks</div>
</div>

<main>

<!-- IMPLEMENTATIONS -->
<div class="panel active" id="panel-implementations">
  <div class="impl-stat-row" id="impl-stats"></div>
  <div class="section-title">
    <span>Epics &amp; Stories</span>
    <span id="impl-overdue-label" style="color:var(--red)"></span>
  </div>
  <div class="epics-grid" id="epics-grid"></div>
</div>

<!-- SUPPORT -->
<div class="panel" id="panel-support">
  <div class="support-filters" style="margin-bottom:16px">
    <span class="filter-label">Period:</span>
    <button class="filter-btn time-filter-btn active" onclick="setTimeFilter('all',this)">All 2026</button>
    <button class="filter-btn time-filter-btn" onclick="setTimeFilter(1,this)">Jan</button>
    <button class="filter-btn time-filter-btn" onclick="setTimeFilter(2,this)">Feb</button>
    <button class="filter-btn time-filter-btn" onclick="setTimeFilter(3,this)">Mar</button>
    <button class="filter-btn time-filter-btn" onclick="setTimeFilter(4,this)">Apr</button>
    <button class="filter-btn time-filter-btn" onclick="setTimeFilter(5,this)">May</button>
    <button class="filter-btn time-filter-btn" onclick="setTimeFilter(6,this)">Jun</button>
  </div>
  <div class="stat-row" id="supp-stats"></div>

  <!-- INSIGHTS STRIP -->
  <div id="supp-insights-strip"></div>

  <!-- SUBCATEGORY BREAKDOWN -->
  <div class="section-title" style="margin-top:4px">
    <span>Tickets by Sub-category</span>
    <span id="supp-cat-total" style="color:var(--muted);font-size:11px"></span>
  </div>
  <div id="supp-category-breakdown"></div>

</div>

<!-- BUGS & TASKS PANEL -->
<div class="panel" id="panel-bugs">
  <div class="support-filters" style="margin-bottom:16px">
    <span class="filter-label">Customer:</span>
    <button class="filter-btn bugs-cust-btn active" onclick="setBugsCust('',this)">All</button>
    <button class="filter-btn bugs-cust-btn" onclick="setBugsCust('MSC',this)">MSC</button>
    <button class="filter-btn bugs-cust-btn" onclick="setBugsCust('Gebruder Weiss',this)">GW</button>
    <button class="filter-btn bugs-cust-btn" onclick="setBugsCust('AIT',this)">AIT</button>
    <button class="filter-btn bugs-cust-btn" onclick="setBugsCust('Titanium',this)">Titanium</button>
    <button class="filter-btn bugs-cust-btn" onclick="setBugsCust('JAS',this)">JAS</button>

// ── SUPPORT HELPERS ───────────────────────────────────────────────────────────
function statsMedian(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}
function statsMean(arr) {
  return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
}
function r1(v) { return Math.round(v * 10) / 10; }

function computeSuppData(tickets) {
  const hours = tickets.map(t => t.hours);
  const priorities = ['Urgent', 'High', 'Normal', 'Low'];
  const priority = priorities.map(p => {
    const g = tickets.filter(t => t.priority === p).map(t => t.hours);
    return [p, r1(statsMedian(g)), g.length];
  }).filter(d => d[2] > 0);
  const assigneeNames = ['Amrutha Nanda', 'Vaishaka Nalka'];
  const assignee = assigneeNames.map(a => {
    const g = tickets.filter(t => t.assignee === a).map(t => t.hours);
    return [a, r1(statsMedian(g)), g.length];
  }).filter(d => d[2] > 0);
  const types = ['Task', 'Question', 'Bug'];
  const type_data = types.map(tp => {
    const g = tickets.filter(t => t.type === tp).map(t => t.hours);
    return [tp, r1(statsMedian(g)), g.length];
  }).filter(d => d[2] > 0);
  const buckets = [
    tickets.filter(t => t.hours <= 4).length,
    tickets.filter(t => t.hours > 4 && t.hours <= 8).length,
    tickets.filter(t => t.hours > 8 && t.hours <= 24).length,
    tickets.filter(t => t.hours > 24 && t.hours <= 48).length,
    tickets.filter(t => t.hours > 48 && t.hours <= 72).length,
    tickets.filter(t => t.hours > 72 && t.hours <= 168).length,
    tickets.filter(t => t.hours > 168).length,
  ];
  return {
    total: tickets.length,
    median: r1(statsMedian(hours)),
    mean: r1(statsMean(hours)),
    pct_24h: hours.length ? r1(hours.filter(h => h <= 24).length / hours.length * 100) : 0,
    pct_7d: hours.length ? r1(hours.filter(h => h >= 168).length / hours.length * 100) : 0,
    priority, assignee, type_data, buckets
  };
}

let activeTimeFilter = 'all';

function setTimeFilter(val, btn) {
  activeTimeFilter = val;
  document.querySelectorAll('.time-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  const filtered = activeTimeFilter === 'all' ? TICKETS : TICKETS.filter(t => t.month === activeTimeFilter);
  buildSuppStatsFrom(computeSuppData(filtered));
  buildInsightsStrip(filtered);
  buildCategoryBreakdown(filtered);
}

// ── SUPPORT STATS ─────────────────────────────────────────────────────────────
function buildSuppStats() {
  const data = computeSuppData(TICKETS);
  buildSuppStatsFrom(data);
  buildInsightsStrip(TICKETS);
  buildCategoryBreakdown(TICKETS);
}

function buildSuppStatsFrom(data) {
  const s = [
    { label: 'Total Tickets', value: data.total, sub: 'in selected period', color: 'var(--accent)' },
    { label: 'Median Resolve', value: fmtHrs(data.median), sub: 'median hours to solve', color: 'var(--accent2)' },
    { label: 'Mean Resolve', value: fmtHrs(data.mean), sub: 'mean hours to solve', color: 'var(--yellow)' },
    { label: 'Within 24h', value: data.pct_24h + '%', sub: 'resolved same-day', color: 'var(--green)' },
    { label: '7+ Days', value: data.pct_7d + '%', sub: 'took a week or more', color: 'var(--red)' },
  ];
  document.getElementById('supp-stats').innerHTML = s.map(c => `
    <div class="stat-card" style="--accent-color:${c.color}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>
  `).join('');
}

function fmtHrs(h) {
  if (h < 24) return h.toFixed(1) + 'h';
  return (h / 24).toFixed(1) + 'd';
}

// ── INSIGHTS STRIP ────────────────────────────────────────────────────────────
function buildInsightsStrip(tickets) {
  const total = tickets.length;
  if (!total) { document.getElementById('supp-insights-strip').innerHTML = ''; return; }

  const catMap = {}, subMap = {};

      icon: '📋',
      color: 'var(--teal)',

  ];

  document.getElementById('supp-insights-strip').innerHTML = `
    <div class="insights-strip">
      ${insights.map(ins => `
        <div class="insight-card" style="border-top-color:${ins.color}">
          <div class="insight-icon">${ins.icon}</div>

            <div class="insight-detail">${ins.detail}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── SUBCATEGORY BREAKDOWN ────────────────────────────────────────────────────
function buildCategoryBreakdown(tickets) {
  const total = tickets.length;
  if (!total) { document.getElementById('supp-category-breakdown').innerHTML = ''; return; }

  const subMap = {};
  tickets.forEach(t => {
    const s = t.subCategory || 'uncategorized';
    const c = t.category || 'uncategorized';
    const hasJira = t.jira && t.jira !== '-';
    if (!subMap[s]) subMap[s] = { total:0, jira:0, category:c };
    subMap[s].total++;
    if (hasJira) subMap[s].jira++;
  });

  const ranked = Object.entries(subMap).sort((a,b)=>b[1].total-a[1].total);
  const maxTotal = ranked[0][1].total;

  const catColors = {
    rateai:'#4f8ef7', system_question:'#7c5cfc', user_access:'#22c55e',
    configuration_investigation:'#f59e0b', system_latency:'#ef4444',
    data_import:'#14b8a6', wrong_ticket:'#5a6180', change_request:'#f97316',
    contract_ai:'#14b8a6', enhancement_request:'#a78bfa',
    proactive_check:'#34d399', outage_report:'#ef4444',
  };
  const fmt = s => (s||'').replace(/_/g,' ').replace(/\//g,' / ').replace(/-/g,' ');
  const escColor = pct => pct === 100 ? 'var(--red)' : pct >= 60 ? 'var(--orange)' : pct >= 30 ? 'var(--yellow)' : 'var(--green)';

  document.getElementById('supp-cat-total').textContent = total + ' tickets · ' + ranked.length + ' sub-categories';
  document.getElementById('supp-category-breakdown').innerHTML = `

          <th>Category</th>

          <th style="text-align:right">Jira</th>
          <th style="text-align:right">No Jira</th>
          <th style="text-align:right">Esc %</th>
        </tr></thead>
        <tbody>
          ${ranked.map(([sub, v]) => {
            const noJira = v.total - v.jira;
            const escPct = v.total ? Math.round(v.jira / v.total * 100) : 0;
            const color = catColors[v.category] || '#5a6180';
            const barW = Math.round(v.total / maxTotal * 100);
            return `<tr>
              <td>
                <div class="subcat-name-cell">
                  <div class="subcat-vol-bar" style="width:${barW}%;background:${color}22"></div>
                  <span class="subcat-name">${fmt(sub)}</span>
                </div>
              </td>
              <td><span class="subcat-cat-chip" style="background:${color}22;color:${color};border:1px solid ${color}44">${fmt(v.category)}</span></td>
              <td class="subcat-num">${v.total}</td>
              <td class="subcat-num" style="color:var(--accent)">${v.jira}</td>
              <td class="subcat-num" style="color:var(--muted)">${noJira}</td>
              <td class="subcat-num"><span class="esc-badge" style="background:${escColor(escPct)}22;color:${escColor(escPct)};border:1px solid ${escColor(escPct)}44">${escPct}%</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

let suppFilter = 'All';
let suppSearch = '';
let suppPage = 1;
const PAGE_SIZE = 15;

function setSuppFilter(p, btn) {
  suppFilter = p;
  suppPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderSuppTable();
}

function filterSupport() {
  suppSearch = document.getElementById('supp-search').value.toLowerCase();
  suppPage = 1;
  renderSuppTable();
}

function getFiltered() {
  return TICKETS.filter(t => {
    const mp = suppFilter === 'All' || t.priority === suppFilter;
    const ms = !suppSearch || [t.subject||'', t.org, t.assignee, t.jira].join(' ').toLowerCase().includes(suppSearch);
    return mp && ms;
  });
}

function hrsClass(h) {
  if (h <= 24) return 'hours-fast';
  if (h <= 168) return 'hours-ok';
  return 'hours-slow';
}

function priorityBadgeCls(p) {
  return { Urgent:'badge-urgent', High:'badge-high', Normal:'badge-normal', Low:'badge-low' }[p] || 'badge-normal';
}
function typeBadgeCls(t) {
  return { Bug:'badge-bug', Question:'badge-question', Task:'badge-task' }[t] || 'badge-normal';
}

function renderSuppTable() {
  const filtered = getFiltered();
  const total = filtered.length;
  const start = (suppPage - 1) * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, total);
  const page = filtered.slice(start, end);

  document.getElementById('supp-tbody').innerHTML = page.map(t => {
    const cls = hrsClass(t.hours);
    const hrsLabel = t.hours < 24 ? t.hours.toFixed(1) + 'h' : (t.hours/24).toFixed(1) + 'd';
    const reqDate = new Date(t.requested).toLocaleDateString('en-US', {month:'short', day:'numeric'});
    return `<tr>
      <td class="mono">${t.id}</td>
      <td><div class="truncate" title="${t.subject||''}">${t.subject||'—'}</div></td>
      <td class="mono">${t.org || '—'}</td>
      <td style="font-size:11px;white-space:nowrap">${t.assignee.split(' ').slice(0,2).join(' ')}</td>
      <td><span class="badge ${priorityBadgeCls(t.priority)}">${t.priority}</span></td>
      <td>${t.type ? `<span class="badge ${typeBadgeCls(t.type)}">${t.type}</span>` : '—'}</td>
      <td class="mono">${t.jira && t.jira !== '-' ? t.jira : '—'}</td>
      <td class="mono">${reqDate}</td>
      <td class="hours-cell ${cls}">${hrsLabel}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted)">No tickets match</td></tr>';

  document.getElementById('supp-page-info').textContent = `${start+1}–${end} of ${total} tickets`;
  document.getElementById('btn-prev').disabled = suppPage === 1;
  document.getElementById('btn-next').disabled = end >= total;
}

function changePage(dir) { suppPage += dir; renderSuppTable(); }

function excelToDate(s) {
  if (!s) return null;
  const base = new Date(1899, 11, 30);
  return new Date(base.getTime() + s * 86400000);
}
function fmtDate(s) {
  if (!s) return null;
  return excelToDate(s).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
const isOverdue = s => s && s < TODAY_SERIAL;
const isSoon = s => s && s >= TODAY_SERIAL && s <= TODAY_SERIAL + 14;

// Sort stories within each epic by STORY_ORDER
function sortStories(stories) {
  return [...stories].sort((a, b) => {
    const ai = STORY_ORDER.indexOf(a.summary);
    const bi = STORY_ORDER.indexOf(b.summary);
    const an = ai === -1 ? 999 : ai;
    const bn = bi === -1 ? 999 : bi;
    return an - bn;
  });
}

function getCurrentPhase(epicKey) {
  const stories = sortStories(STORIES_RAW.filter(s => s.parent === epicKey));
  const active = stories.find(s => s.status !== 'Done');
  return active ? active.summary : 'Done';
}

        ${(() => {
          // Map category to customer name in bugs/tasks data
          const custMap = { GW:'Gebruder Weiss', MSC:'MSC', AIT:'AIT', Titanium:'Titanium', OIA:'OIA' };
          const custName = custMap[epic.category];
          if (!custName) return '';
          const epicBugs = BUGS_RAW.filter(b => (b.customer||'').includes(custName)).slice(0,4);
          const epicTasks = TASKS_RAW.filter(t => (t.customer||'').includes(custName)).slice(0,3);
          if (!epicBugs.length && !epicTasks.length) return '';
          const allItems = [
            ...epicBugs.map(b => ({...b, _type:'bug'})),
            ...epicTasks.map(t => ({...t, _type:'task'}))
          ];
          return `<div class="epic-linked">
            <div class="epic-linked-title">🔗 Open Items · ${custName} &nbsp;<span style="font-weight:normal;color:var(--muted)">${epicBugs.length} bug${epicBugs.length!==1?'s':''} · ${epicTasks.length} task${epicTasks.length!==1?'s':''} shown</span></div>
            <div class="epic-linked-list">
              ${allItems.map(item => `<div class="epic-linked-item">
                <span class="item-type-icon">${item._type==='bug'?'🐛':'✅'}</span>
                <span class="item-key">${item.key}</span>
                <span class="item-summary" title="${item.summary.replace(/"/g,"'")}">${item.summary}</span>
                <span class="badge ${bugStatusCls(item.status)}" style="font-size:9px;flex-shrink:0">${item.status}</span>
              </div>`).join('')}
            </div>
          </div>`;
        })()}
      </div>
    </div>`;
  }).join('');
}

function toggleEpic(key) {
  const g = document.getElementById('epic-' + key);
  const s = g.querySelector('.epic-stories');
  const open = g.classList.toggle('open');
  s.classList.toggle('hidden', !open);
}

// ── BUGS & TASKS TAB ──────────────────────────────────────────────────────────
let bugsCustFilter = '';
let bugsSearch = '';
let bugsPage = 1;
let bugsTableMode = 'bugs'; // 'bugs' | 'tasks'
const BUGS_PAGE_SIZE = 20;

function setBugsCust(cust, btn) {
  bugsCustFilter = cust;
  bugsPage = 1;
  document.querySelectorAll('.bugs-cust-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderBugsStats();
  renderBugsTable();
}

function filterBugsTable() {
  bugsSearch = document.getElementById('bugs-search').value.toLowerCase();
  bugsPage = 1;
  renderBugsTable();
}

function switchBugsTable(mode) {
  bugsTableMode = mode;
  bugsPage = 1;
  document.getElementById('tab-bugs-btn').classList.toggle('active', mode === 'bugs');
  document.getElementById('tab-tasks-btn').classList.toggle('active', mode === 'tasks');
  renderBugsStats();
  renderBugsTable();
}

function getBugsFiltered() {
  const src = bugsTableMode === 'bugs' ? BUGS_RAW : TASKS_RAW;
  return src.filter(b => {
    const custMatch = !bugsCustFilter || (b.customer||'').includes(bugsCustFilter);
    const searchMatch = !bugsSearch || [b.key, b.summary, b.customer, b.status, b.assignee].join(' ').toLowerCase().includes(bugsSearch);
    return custMatch && searchMatch;
  }).sort((a, b) => {
    const numA = parseInt(a.key.replace(/\D/g,'')) || 0;
    const numB = parseInt(b.key.replace(/\D/g,'')) || 0;
    return numB - numA;
  });
}

function bugStatusCls(s) {
  if (!s) return 'badge-item-open';
  const sl = s.toLowerCase();
  if (sl.includes('reported') || sl.includes('rca') || sl.includes('support action')) return 'badge-item-blocked';
  if (sl.includes('dev in') || sl.includes('in progress') || sl.includes('under review') || sl.includes('in testing')) return 'badge-item-inprogress';
  if (sl.includes('complete') || sl.includes('deployment') || sl.includes('test complete') || sl.includes('dev complete')) return 'badge-item-done';
  return 'badge-item-open';
}

function renderBugsStats() {
  const bugs = !bugsCustFilter ? BUGS_RAW : BUGS_RAW.filter(b => (b.customer||'').includes(bugsCustFilter));
  const tasks = !bugsCustFilter ? TASKS_RAW : TASKS_RAW.filter(t => (t.customer||'').includes(bugsCustFilter));
  const openBugs = bugs.filter(b => !['dev complete','ready for deployment','testing complete','test complete'].some(s => b.status.toLowerCase().includes(s)));
  const openTasks = tasks.filter(t => !['dev complete','test complete'].some(s => t.status.toLowerCase().includes(s)));
  const inProgressBugs = bugs.filter(b => ['dev in progress','in testing','under review','ready for uat','ready for testing','rca pending','support action'].some(s => b.status.toLowerCase().includes(s)));

  document.getElementById('bugs-stats').innerHTML = [
    { label:'Total Bugs', value:bugs.length, sub:'all tracked bugs', color:'var(--red)' },
    { label:'Open Bugs', value:openBugs.length, sub:'not yet resolved', color:'var(--orange)' },
    { label:'In Progress', value:inProgressBugs.length, sub:'actively being worked', color:'var(--accent)' },
    { label:'Tasks', value:tasks.length + ' / ' + openTasks.length + ' open', sub:'total / open tasks', color:'var(--teal)' },
  ].map(c => `<div class="stat-card" style="--accent-color:${c.color}">
    <div class="stat-label">${c.label}</div>
    <div class="stat-value" style="font-size:${c.value.toString().length > 4 ? '20px':'30px'}">${c.value}</div>
    <div class="stat-sub">${c.sub}</div>
  </div>`).join('');
}

function renderBugsTable() {
  const filtered = getBugsFiltered();
  const total = filtered.length;
  const start = (bugsPage - 1) * BUGS_PAGE_SIZE;
  const end = Math.min(start + BUGS_PAGE_SIZE, total);
  const page = filtered.slice(start, end);

  document.getElementById('bugs-tbody').innerHTML = page.map(b => `<tr>
    <td class="mono" style="white-space:nowrap">${b.key}</td>
    <td><div class="truncate" style="max-width:380px" title="${b.summary.replace(/"/g,"'")}">${b.summary}</div></td>
    <td style="font-size:11px;white-space:nowrap">${b.customer||'—'}</td>
    <td><span class="badge ${bugStatusCls(b.status)}" style="font-size:9px">${b.status||'—'}</span></td>
    <td style="font-size:11px;white-space:nowrap;color:var(--muted)">${b.assignee||'—'}</td>
  </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--muted)">No items match</td></tr>';

  document.getElementById('bugs-page-info').textContent = total ? `${start+1}–${end} of ${total}` : '0 results';
  document.getElementById('bugs-btn-prev').disabled = bugsPage === 1;
  document.getElementById('bugs-btn-next').disabled = end >= total;
}

function changeBugsPage(dir) { bugsPage += dir; renderBugsTable(); }

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
let bugsBuilt = false;
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['implementations','support','bugs'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'bugs' && !bugsBuilt) {
    bugsBuilt = true;
    renderBugsStats();
    renderBugsTable();
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildImplStats();
buildEpicGroups();
buildSuppStats();
</script>
